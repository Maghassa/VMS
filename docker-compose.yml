version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vms
      POSTGRES_USER: vms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vms_user -d vms"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: vms-ai-engine
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=http://api:4000
      - AI_ENGINE_PORT=8000
      - STORAGE_PATH=/storage
    volumes:
      - ./storage:/storage
      - ./ai-engine/models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vms-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - AI_ENGINE_URL=http://ai-engine:8000
      - STORAGE_PATH=/storage
      - STAGING_DB_URL=${STAGING_DB_URL}
      - STAGING_API_TOKEN=${STAGING_API_TOKEN}
      - DISK_WARNING_PCT=${DISK_WARNING_PCT:-70}
      - DISK_CRITICAL_PCT=${DISK_CRITICAL_PCT:-85}
      - AUTO_DISMISS_HOURS=${AUTO_DISMISS_HOURS:-24}
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - ./storage:/storage
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-engine:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vms-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://${DOMAIN}/api
      - NEXT_PUBLIC_WS_URL=ws://${DOMAIN}/ws
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: vms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
